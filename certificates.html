        <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.05" />
        <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.5" />
        <stop offset="100%" stop-color="#39ff88" stop-opacity="0.4" />
      </linearGradient>
    </defs>
  </svg>

  <header id="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">

      <nav id="nav-links">

  <main>

    <!-- ============ CERTIFICATES ============ -->
    <section id="certificates" class="section">
      <div class="section-head">
        <span class="designator">U6</span>
        <h2>Certificates</h2>
      </div>
      <div class="cert-grid">

        <button type="button" class="cert-card cert-card--portrait"
          data-cert-src="assets/certs/internship-praya-labs.jpg"
          data-cert-title="Internship Completion Letter — PRAYA LABS">
          <div class="cert-thumb cert-thumb--portrait">
            <img src="assets/certs/internship-praya-labs.jpg"
              alt="Internship completion letter from internship-praya-labs LABS" onerror="this.style.display='none'">
            <div class="cert-thumb-fallback">
              <svg viewBox="0 0 100 130" width="70" aria-hidden="true">
                <rect x="6" y="6" width="88" height="118" rx="4" fill="none" stroke="#00e5ff" stroke-width="2" />
                <line x1="20" y1="34" x2="80" y2="34" stroke="#39ff88" stroke-width="2" />
                <line x1="20" y1="50" x2="80" y2="50" stroke="#1c2833" stroke-width="2" />
                <line x1="20" y1="60" x2="80" y2="60" stroke="#1c2833" stroke-width="2" />
                <line x1="20" y1="70" x2="80" y2="70" stroke="#1c2833" stroke-width="2" />
                <circle cx="50" cy="100" r="12" fill="none" stroke="#ff8a3d" stroke-width="2" />
              </svg>
            </div>
          </div>
          <div class="cert-card-body">
            <p class="cert-tag">VIEW CERTIFICATE →</p>
            <h3>Internship Completion Letter</h3>
            <p class="cert-org">PRAYA LABS, Tiruvannamalai</p>
          </div>
        </button>

        <button type="button" class="cert-card cert-card--landscape" data-cert-src="assets/certs/udemy-robotics.jpg"
          data-cert-title="Basic Robotics Course — Udemy">
          <div class="cert-thumb cert-thumb--landscape">
            <img src="assets/certs/udemy-robotics.jpg" alt="Basic Robotics Course certificate from Udemy"
              onerror="this.style.display='none'">
            <div class="cert-thumb-fallback">
              <svg viewBox="0 0 140 100" width="80" aria-hidden="true">
                <rect x="6" y="6" width="128" height="88" rx="4" fill="none" stroke="#00e5ff" stroke-width="2" />
                <line x1="24" y1="30" x2="116" y2="30" stroke="#39ff88" stroke-width="2" />
                <line x1="24" y1="44" x2="90" y2="44" stroke="#1c2833" stroke-width="2" />
                <circle cx="108" cy="66" r="14" fill="none" stroke="#ff8a3d" stroke-width="2" />
              </svg>
            </div>
          </div>
          <div class="cert-card-body">
            <p class="cert-tag">VIEW CERTIFICATE →</p>
            <h3>Basic Robotics Course</h3>
            <p class="cert-org">Udemy</p>
          </div>
        </button>

        <button type="button" class="cert-card cert-card--landscape" data-cert-src="assets/certs/coursera-robotics.jpg"
          data-cert-title="Basic Robotics Course — Coursera">
          <div class="cert-thumb cert-thumb--landscape">
            <img src="assets/certs/coursera-robotics.jpg" alt="Basic Robotics Course certificate from Coursera"
              onerror="this.style.display='none'">
            <div class="cert-thumb-fallback">
              <svg viewBox="0 0 140 100" width="80" aria-hidden="true">
                <rect x="6" y="6" width="128" height="88" rx="4" fill="none" stroke="#00e5ff" stroke-width="2" />
                <line x1="24" y1="30" x2="116" y2="30" stroke="#39ff88" stroke-width="2" />
                <line x1="24" y1="44" x2="90" y2="44" stroke="#1c2833" stroke-width="2" />
                <circle cx="108" cy="66" r="14" fill="none" stroke="#ff8a3d" stroke-width="2" />
              </svg>
            </div>
          </div>
          <div class="cert-card-body">
            <p class="cert-tag">VIEW CERTIFICATE →</p>
            <h3>Basic Robotics Course</h3>
            <p class="cert-org">Coursera</p>
          </div>
        </button>

      </div>
    </section>

    <!-- Certificate lightbox viewer -->
    <div id="cert-lightbox" class="lightbox" hidden>
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close certificate viewer">✕</button>
      <div class="lightbox-inner">
        <img id="lightbox-img" src="" alt="">
        <p id="lightbox-title" class="lightbox-title"></p>
      </div>
    </div>

  </main>

  <footer>
    <p>Designed &amp; built by N Devadharshan · <span id="year"></span></p>
